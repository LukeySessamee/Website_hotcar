<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Attack Game</title>
  <link rel="stylesheet" hsref="game.css">
</head>
<body>

  <h1>defend beautiful milwalkee</h1>
  <p>Move with WASD or arrow keys. Avoid enemies unless powered up.</p>

  <div class="hud">
    <p>Score: <span id="score">0</span></p>
    <p>Lives: <span id="lives">5</span></p>
    <p>Level: <span id="level">1</span></p>
    <p>Power: <span id="powerTimer">0.0s</span></p>
  </div>

  <div id="gameArea">
    <div id="player"></div>
  </div>

  <div class="buttons">
    <button id="restartBtn" type="button">Restart</button>

    <a href="../Main_Page/index.html">Back to Home</a>
  </div>

  <p id="gameMessage"></p>

  <script src="game.js"></script>
</body>
